global:
  resolve_timeout: 1m

route:
  group_by: ['alertname', 'severity']
  group_wait: 15s        # wait 15s to batch alerts firing together
  group_interval: 1m
  repeat_interval: 4h    # don't re-fire the same alert more than once per 4h
  receiver: 'aegis-webhook'
  routes:
    # Critical alerts skip grouping delay — fire immediately
    - match:
        severity: critical
      group_wait: 0s
      receiver: 'aegis-webhook'

receivers:
  - name: 'aegis-webhook'
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'
        send_resolved: true
        http_config:
          authorization:
            credentials_file: /run/secrets/alert_webhook_secret
            type: Bearer
